<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Boulanger — Services &amp; Tarifs</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --or:#FF6600;--orl:#FFF3EB;--orm:#FFD9BD;
  --bg:#F4F5F7;--s:#fff;--s2:#F9F9FB;
  --bd:#EBEBEE;--bd2:#DDDDE5;
  --t:#111318;--t2:#5C5F6E;--t3:#9DA0AF;
  --sha:0 1px 3px rgba(0,0,0,.06);
  --shb:0 4px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  --r:10px;--rl:14px;
  --f:'Plus Jakarta Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--f);background:var(--bg);color:var(--t);min-height:100vh;-webkit-font-smoothing:antialiased;}
.hd{background:var(--s);border-bottom:1px solid var(--bd);height:56px;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:200;box-shadow:var(--sha);}
.logo img{height:26px;display:block;}
.hd-sep{width:1px;height:22px;background:var(--bd2);flex-shrink:0;}
.sw{position:relative;flex:1;max-width:440px;}
.sw input{width:100%;background:var(--bg);border:1.5px solid var(--bd);border-radius:22px;padding:8px 36px 8px 38px;font-size:13px;font-family:var(--f);color:var(--t);outline:none;transition:all .15s;}
.sw input:focus{border-color:var(--or);background:var(--s);box-shadow:0 0 0 3px rgba(255,102,0,.1);}
.sw input::placeholder{color:var(--t3);}
.si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;}
.sc{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--t3);cursor:pointer;font-size:17px;display:none;line-height:1;}
.hd-r{margin-left:auto;}
.rb{display:flex;align-items:center;gap:7px;padding:6px 14px;border:1.5px solid var(--bd2);border-radius:8px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;background:var(--s);font-family:var(--f);transition:all .15s;}
.rb:hover,.rb.on{border-color:var(--or);color:var(--or);}
.rbg{background:var(--or);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;min-width:18px;text-align:center;}
.lay{display:flex;min-height:calc(100vh - 56px);}
.sb{width:210px;flex-shrink:0;background:var(--s);border-right:1px solid var(--bd);padding:16px 0;display:flex;flex-direction:column;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;}
.sbl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.09em;text-transform:uppercase;padding:8px 16px 4px;}
.sbi{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-left:2px solid transparent;transition:all .12s;user-select:none;}
.sbi:hover{background:var(--orl);color:var(--t);}
.sbi.on{background:var(--orl);color:var(--or);border-left-color:var(--or);font-weight:600;}
.sbi-ico{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.sbsep{height:1px;background:var(--bd);margin:8px 12px;}
.sbrec{margin:auto 12px 12px;background:var(--orl);border:1.5px solid var(--orm);border-radius:var(--r);padding:11px 13px;cursor:pointer;transition:all .15s;}
.sbrec:hover{background:#FFE5CC;border-color:var(--or);}
.sbrec.on{background:var(--or);border-color:var(--or);}
.sbrec.on .srl,.sbrec.on .srt{color:#fff;}
.srtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.srl{font-size:10.5px;font-weight:700;color:var(--or);letter-spacing:.06em;text-transform:uppercase;}
.srn{background:var(--or);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;}
.sbrec.on .srn{background:rgba(255,255,255,.3);}
.srt{font-size:18px;font-weight:800;color:var(--or);letter-spacing:-.3px;}
.main{flex:1;padding:20px 24px;overflow:auto;}
.pgt{font-size:21px;font-weight:800;color:var(--t);margin-bottom:4px;letter-spacing:-.3px;}
.pgt span{color:var(--or);}
.pgs{font-size:13px;color:var(--t3);margin-bottom:22px;}
.hgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.hc{background:var(--s);border:1.5px solid var(--bd);border-radius:18px;padding:36px 28px 30px;cursor:pointer;transition:all .2s;box-shadow:var(--sha);position:relative;overflow:hidden;min-height:220px;display:flex;flex-direction:column;justify-content:space-between;}
.hc::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--or);transform:scaleX(0);transform-origin:left;transition:transform .22s;}
.hc::after{content:'';position:absolute;bottom:0;right:0;width:90px;height:90px;border-radius:50%;background:var(--orl);transform:translate(30px,30px);transition:all .25s;z-index:0;}
.hc:hover{border-color:var(--or);box-shadow:0 8px 32px rgba(255,102,0,.13),0 2px 8px rgba(0,0,0,.06);transform:translateY(-3px);}
.hc:hover::before{transform:scaleX(1);}
.hc:hover::after{transform:translate(20px,20px) scale(1.15);background:var(--orm);}
.hcico{font-size:46px;margin-bottom:14px;display:block;position:relative;z-index:1;line-height:1;}
.hct{font-size:17px;font-weight:800;color:var(--t);margin-bottom:5px;position:relative;z-index:1;letter-spacing:-.2px;}
.hcs{font-size:12.5px;color:var(--t2);line-height:1.55;position:relative;z-index:1;}
.hcsecs{font-size:11px;color:var(--t3);margin-top:7px;line-height:1.5;position:relative;z-index:1;}
.hcn{margin-top:16px;display:inline-flex;font-size:12px;font-weight:700;color:var(--or);background:var(--orl);padding:4px 13px;border-radius:20px;border:1.5px solid var(--orm);position:relative;z-index:1;}
.fh{display:flex;align-items:flex-start;gap:12px;margin-bottom:24px;}
.back{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid var(--bd2);border-radius:7px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;background:var(--s);font-family:var(--f);transition:all .15s;flex-shrink:0;}
.back:hover{border-color:var(--or);color:var(--or);}
.sechd{display:flex;align-items:center;gap:8px;margin:20px 0 9px;}
.secl{font-size:10.5px;font-weight:700;color:var(--t3);letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;}
.secln{flex:1;height:1px;background:var(--bd);}
.rows{display:flex;flex-direction:column;gap:5px;}
.row{display:flex;align-items:center;gap:12px;background:var(--s);border:1.5px solid var(--bd);border-radius:var(--r);padding:11px 14px;cursor:pointer;transition:all .12s;box-shadow:var(--sha);animation:fu .14s ease both;}
.row:hover{border-color:var(--bd2);box-shadow:var(--shb);}
.row.sel{border-color:var(--or);background:var(--orl);}
.chk{width:19px;height:19px;border-radius:6px;border:1.5px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;background:var(--s);}
.row.sel .chk{background:var(--or);border-color:var(--or);box-shadow:0 2px 6px rgba(255,102,0,.3);}
.ck{width:9px;height:8px;display:none;}
.row.sel .ck{display:block;}
.rb2{flex:1;min-width:0;}
.rn{font-size:13px;font-weight:500;color:var(--t);line-height:1.4;}
.rr{font-size:11px;color:var(--t2);font-family:monospace;margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.taghg{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600;background:#FEE9E7;color:#C0392B;margin-top:4px;display:inline-block;}
.rp{font-size:14px;font-weight:800;color:var(--t);white-space:nowrap;flex-shrink:0;letter-spacing:-.2px;}
.row.sel .rp{color:var(--or);}
.rowp{display:flex;flex-direction:column;}
.subrow{padding-left:18px !important;background:var(--s2) !important;}
.subrow:hover{background:var(--orl) !important;}
.subrow.sel{background:var(--orl) !important;}
mark{background:#FFE8D3;color:var(--or);border-radius:2px;padding:0 1px;}
.bb{background:var(--s);border:1.5px solid var(--bd);border-radius:var(--rl);padding:18px;margin-top:28px;box-shadow:var(--sha);}
.bbt{font-size:10.5px;font-weight:700;color:var(--t3);letter-spacing:.09em;text-transform:uppercase;margin-bottom:12px;}
.bbr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bg);gap:8px;font-size:12.5px;color:var(--t2);}
.bbr:last-of-type{border:none;}
.bbrm{color:var(--bd2);cursor:pointer;font-size:16px;flex-shrink:0;transition:color .1s;margin-left:4px;}
.bbrm:hover{color:var(--or);}
.bbdiv{height:1.5px;background:var(--bd);margin:12px 0;}
.bbtot{display:flex;justify-content:space-between;align-items:baseline;}
.bbtl{font-size:11.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;}
.bbta{font-size:24px;font-weight:800;color:var(--or);letter-spacing:-.4px;}
.bbcl{margin-top:12px;width:100%;padding:8px;border:1.5px solid var(--bd2);background:var(--s);color:var(--t3);font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;font-family:var(--f);transition:all .15s;}
.bbcl:hover{border-color:var(--or);color:var(--or);}
.dvlay{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start;max-width:100%;}
.dvfc{background:var(--s);border:1.5px solid var(--bd);border-radius:var(--rl);padding:22px;box-shadow:var(--sha);}
.dvft{font-size:10.5px;font-weight:700;color:var(--t3);letter-spacing:.09em;text-transform:uppercase;margin-bottom:16px;}
.fg{margin-bottom:13px;}
.fl{font-size:11.5px;font-weight:600;color:var(--t2);margin-bottom:5px;display:block;}
.fi{width:100%;background:var(--bg);border:1.5px solid var(--bd);border-radius:8px;padding:8px 11px;font-size:13px;font-family:var(--f);color:var(--t);outline:none;transition:all .15s;}
.fi:focus{border-color:var(--or);background:var(--s);box-shadow:0 0 0 3px rgba(255,102,0,.08);}
.fi::placeholder{color:var(--t3);}
textarea.fi{resize:vertical;min-height:72px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.genbtn{width:100%;margin-top:14px;padding:11px;background:var(--or);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:var(--f);cursor:pointer;transition:all .15s;}
.genbtn:hover{background:#e55a00;box-shadow:0 4px 16px rgba(255,102,0,.3);}
.dvpw{background:var(--s);border:1.5px solid var(--bd);border-radius:var(--rl);padding:18px;box-shadow:var(--sha);}
.dvph{font-size:10.5px;font-weight:700;color:var(--t3);letter-spacing:.09em;text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.prbtn{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1.5px solid var(--bd2);border-radius:7px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;background:var(--s);font-family:var(--f);transition:all .15s;}
.prbtn:hover{border-color:var(--or);color:var(--or);}
#dvdoc{background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1);width:100%;}
.fdl{background:var(--s);border:1.5px solid var(--bd);border-radius:var(--rl);padding:18px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:7px;transition:all .18s;box-shadow:var(--sha);cursor:pointer;position:relative;overflow:hidden;}
.fdl::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--or);transform:scaleX(0);transform-origin:left;transition:transform .2s;}
.fdl:hover{border-color:var(--or);box-shadow:var(--shb);transform:translateY(-2px);}
.fdl:hover::before{transform:scaleX(1);}
.fdltop{display:flex;justify-content:space-between;align-items:flex-start;}
.fdlico{font-size:28px;}
.fdlbdg{font-size:10px;font-weight:700;color:#0078d4;background:#e8f4ff;padding:2px 8px;border-radius:10px;}
.fdln{font-size:13.5px;font-weight:700;color:var(--t);}
.fdls{font-size:11.5px;color:var(--t3);flex:1;}
.fdlft{display:flex;justify-content:space-between;align-items:center;margin-top:5px;padding-top:9px;border-top:1px solid var(--bd);}
.fdlf{font-size:10px;color:var(--t3);font-family:monospace;}
.fdlbtn{font-size:11px;font-weight:600;color:var(--or);background:var(--orl);padding:3px 9px;border-radius:6px;border:1.5px solid var(--orm);}
.fdl:hover .fdlbtn{background:var(--or);color:#fff;border-color:var(--or);}
.icc{background:var(--s);border:1.5px solid var(--bd);border-radius:var(--rl);padding:22px;box-shadow:var(--sha);}
.ichead{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--bd);}
.icico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.icres{margin-top:10px;border-radius:8px;padding:10px 13px;font-size:12.5px;line-height:1.6;}
.icok{background:#e8f8f0;color:#1a7a4a;}
.icerr{background:#fdecea;color:#c0392b;}
.icinfo{background:var(--bg);color:var(--t2);}
.extc{display:flex;align-items:center;gap:12px;background:var(--s);border:1.5px solid var(--bd);border-radius:var(--r);padding:13px 15px;text-decoration:none;color:inherit;transition:all .15s;box-shadow:var(--sha);}
.extc:hover{border-color:var(--or);box-shadow:var(--shb);}
.extico{font-size:20px;flex-shrink:0;}
.extb{flex:1;min-width:0;}
.extn{font-size:13px;font-weight:600;color:var(--t);}
.exts{font-size:11px;color:var(--t3);}
.extbtn{font-size:11px;font-weight:600;color:var(--or);white-space:nowrap;padding:4px 10px;border:1.5px solid var(--orm);border-radius:6px;background:var(--orl);}
.extc:hover .extbtn{background:var(--or);color:#fff;border-color:var(--or);}
.empty{text-align:center;padding:56px 20px;color:var(--t3);}
.empico{font-size:32px;margin-bottom:10px;opacity:.5;}
@keyframes fu{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.sb::-webkit-scrollbar,.main::-webkit-scrollbar{width:4px;}
.sb::-webkit-scrollbar-thumb,.main::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px;}
</style>
</head>

function score(item,q){
  var words=q.toLowerCase().split(" ").filter(function(w){return w.length>0;});
  var exp=words.slice();
  words.forEach(function(w){
    Object.keys(SYN).forEach(function(k){
      if(k.indexOf(w)>=0||w.indexOf(k)>=0) exp=exp.concat(SYN[k].split(" "));
    });
  });
  var hay=(item.name+" "+(item.section||"")+" "+(item.catLabel||"")).toLowerCase();
  if(words.every(function(w){return hay.indexOf(w)>=0;})) return 2;
  if(exp.some(function(w){return w.length>2&&hay.indexOf(w)>=0;})) return 1;
  return 0;
}

function hl(text,q){
  if(!q) return text;
  var out=text;
  q.toLowerCase().split(" ").filter(function(w){return w.length>1;}).forEach(function(w){
    var safe=w.replace(/[^a-z0-9]/gi,".");
    try{out=out.replace(new RegExp("("+safe+")","gi"),"<mark>$1</mark>");}catch(e){}
  });
  return out;
}

// Event delegation — no inline onclick needed
document.addEventListener("click",function(e){
  var el=e.target;
  // walk up to find data-action or data-nav
  while(el&&el!==document.body){
    if(el.dataset.action){
      var a=el.dataset.action,id=el.dataset.id;
      if(a==="toggle") toggle(id);
      else if(a==="expand") toggleExpand(id);
      else if(a==="remove"){removeItem(id);}
      else if(a==="clearall") clearAll();
      else if(a==="dl") doDownload(el.dataset.file);
      else if(a==="removell"){
        lignesLibres=lignesLibres.filter(function(l){return l.id!==id;});
        updateBadge();
        rDevis();
      }
      return;
    }
    if(el.dataset.nav){
      var nav=el.dataset.nav;
      if(nav==="home") goHome();
      else if(nav==="cat") setTab(el.dataset.cat);
      else if(nav==="recap"||nav==="devis"||nav==="fiches"||nav==="icloud") goView(nav);
      return;
    }
    el=el.parentElement;
  }
});

  var h='<div class="fh"><button class="back" data-nav="home">← Retour</button>';
  h+='<div><div class="pgt">'+cat.icon+' <span>'+cat.label+'</span> — '+cat.desc+'</div>';
  h+='<div class="pgs" style="margin-bottom:0;">'+cat.sub+'</div></div></div>';
  var idx=0;
  DATA[catId].sections.forEach(function(sec){
    h+='<div class="sechd"><span class="secl">'+sec.title+'</span><div class="secln"></div></div><div class="rows">';
    sec.items.forEach(function(item){h+=rowH(item,idx,false);idx++;});

function rSearch(){
  var scored=FLAT.map(function(i){return Object.assign({},i,{_score:score(i,searchQ)});}).filter(function(i){return i._score>0;});
  scored.sort(function(a,b){return b._score-a._score;});
  var results=scored.map(function(i){return Object.assign({},i,{_hl:hl(i.name,searchQ)});});
  var h='<div class="pgt">« <span>'+searchQ+'</span> »</div><div class="pgs">'+results.length+' résultat'+(results.length>1?"s":"")+'</div>';
  if(!results.length){
    h+='<div class="empty"><div class="empico">🔍</div><div style="font-size:13px;">Aucun résultat — essaie d&#39;autres mots</div></div>';
  } else {
    h+='<div class="rows">';
    results.forEach(function(item,i){h+=rowH(item,i,true);});
    h+='</div>';
  }
  if(Object.keys(basket).length) h+=bbBlock();
  document.getElementById("main").innerHTML=h;
}

  var yy=d.getFullYear().toString().slice(-2);
  var mm=String(d.getMonth()+1).padStart(2,"0");
  var dd=String(d.getDate()).padStart(2,"0");
  var seq=String(Math.floor(Math.random()*900)+100);
  return "DEV-"+yy+mm+dd+"-"+seq;
}

function isoToFR(iso){
  if(!iso) return new Date().toLocaleDateString("fr-FR");
  var p=iso.split("-");
  if(p.length!==3) return iso;
  return p[2]+"/"+p[1]+"/"+p[0];
}

function buildDevis(){
  saveDvForm();
  var nom=dvSaved.nom||"—";
  var tel=dvSaved.tel||"—";
  var date=isoToFR(dvSaved.dateISO);
  var obs=dvSaved.obs||"";
  var all=getAll();
  var total=all.reduce(function(s,i){return s+i.price;},0);
  var totalHT=total/1.2;
  var totalTVA=total-totalHT;
  if(!dvSaved.num) dvSaved.num=genDevisNum();
  var num=dvSaved.num;

function printDevis(){
  var inner=document.getElementById("dvdoc");
  if(!inner||inner.querySelector(".empico")){buildDevis();setTimeout(printDevis,300);return;}
  var body=inner.innerHTML;
  var w=null;
  try{ w=window.open("","_blank","width=700,height=950"); }catch(e){}
  if(!w||w.closed||typeof w.document==="undefined"){
    // Popup bloqué — fallback : impression de la page en masquant le reste
    var style=document.createElement("style");
    style.id="print-override";
    style.textContent="@media print{body>*{display:none!important;} #print-frame{display:block!important;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:#fff;overflow:auto;} }";
    document.head.appendChild(style);
    var frame=document.createElement("div");
    frame.id="print-frame";
    frame.style.display="none";
    frame.innerHTML=body;
    document.body.appendChild(frame);
    window.print();
    setTimeout(function(){
      var s=document.getElementById("print-override");
      if(s) s.remove();
      var f=document.getElementById("print-frame");
      if(f) f.remove();
    },1000);
    return;
  }
  w.document.open();
  w.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'>");
  w.document.write("<link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap' rel='stylesheet'>");
  w.document.write("<style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#fff;font-family:'Plus Jakarta Sans',Arial,sans-serif;}@page{size:A4 portrait;margin:8mm;}@media print{body{padding:0;}}</style>");
  w.document.write("</head><body>"+body+"</body></html>");
  w.document.close();
  w.onload=function(){setTimeout(function(){w.print();},400);};
}

  fetch(file,{method:"HEAD"}).then(function(r){
    if(r.ok){
      var a=document.createElement("a");
      a.href=file;a.download=file;document.body.appendChild(a);a.click();document.body.removeChild(a);
      if(btn){btn.textContent="✅ Téléchargé";}
      setTimeout(function(){if(btn)btn.textContent="⬇ Télécharger";},3000);
    } else {
      showFicheErr(file,btn);
    }
  }).catch(function(){
    showFicheErr(file,btn);
  });
}

function showFicheErr(file,btn){
  if(btn){btn.textContent="⬇ Télécharger";}
  var msg=document.getElementById("fiche-msg");
  if(msg){
    msg.style.background="#fdecea";msg.style.borderColor="#e74c3c";
    msg.innerHTML='⚠️ <strong style="color:#c0392b;">Fichier introuvable :</strong> <code>'+file+'</code> — place-le dans le même dossier que cet outil HTML puis réessaie.';
    setTimeout(function(){
      if(msg){msg.style.background="";msg.style.borderColor="";
      msg.innerHTML='💡 <strong style="color:var(--or);">Astuce :</strong> Place les fichiers .docx dans le même dossier que cet outil.';}
    },5000);
  }
}
